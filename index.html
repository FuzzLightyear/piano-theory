<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self'; font-src 'self'; connect-src 'self'; img-src 'self' data:; base-uri 'none'; form-action 'none'">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0c0c0e">
<title>Piano Theory</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%23141417'/%3E%3Crect x='2' y='4' width='3' height='8' rx='.6' fill='%23f4efe4'/%3E%3Crect x='6.5' y='4' width='3' height='8' rx='.6' fill='%23f4efe4'/%3E%3Crect x='11' y='4' width='3' height='8' rx='.6' fill='%23f4efe4'/%3E%3Crect x='4.6' y='4' width='1.9' height='5' fill='%230c0c10'/%3E%3Crect x='9.1' y='4' width='1.9' height='5' fill='%230c0c10'/%3E%3C/svg%3E">
<link rel="stylesheet" href="css/studio.css">
<script type="module" src="js/app.js"></script>
</head>
<body>
<div class="app">
  <div class="glow" aria-hidden="true"></div>

  <header class="panel-wrap">
    <div class="panel">

      <div class="group brand">
        <div class="brand-name">Piano Theory</div>
        <div class="brand-sub">Chords &amp; Scales</div>
      </div>

      <div class="group">
        <div class="group-title">Preset</div>
        <div class="row" id="presets">
          <button type="button" class="chip warm" data-start="C2" data-count="61">61</button>
          <button type="button" class="chip warm" data-start="A0" data-count="88">88</button>
          <button type="button" class="chip warm" data-start="C2" data-count="49">49</button>
          <button type="button" class="chip warm" data-start="C4" data-count="25">25</button>
        </div>
      </div>

      <div class="group">
        <div class="group-title">Range · <span class="hint" id="key-count-label">61 keys</span></div>
        <div class="row">
          <select class="sel" id="start-note" aria-label="First key"></select>
          <span class="arrow" aria-hidden="true">→</span>
          <select class="sel" id="end-note" aria-label="Last key"></select>
        </div>
        <div class="row slider-row">
          <span class="minmax">12</span>
          <input type="range" class="range grow" id="key-count" min="12" max="88" step="1" value="61" aria-label="Number of keys">
          <span class="minmax right">88</span>
        </div>
      </div>

      <div class="group">
        <div class="group-title">Highlight</div>
        <div class="row">
          <select class="sel" id="root" aria-label="Root note"></select>
          <select class="sel wide" id="pattern" aria-label="Chord or scale"></select>
        </div>
        <div class="row">
          <button type="button" class="play" id="play">▶ Play</button>
          <div class="row tight" id="label-modes">
            <button type="button" class="chip sm" data-mode="pattern">Scale</button>
            <button type="button" class="chip sm" data-mode="all">All</button>
            <button type="button" class="chip sm" data-mode="c">C</button>
            <button type="button" class="chip sm" data-mode="off">Off</button>
          </div>
        </div>
      </div>

      <div class="group">
        <div class="group-title">View</div>
        <div class="row" id="views">
          <button type="button" class="chip cool" data-view="angled">◆ Angled</button>
          <button type="button" class="chip cool" data-view="top">▦ Overhead</button>
        </div>
      </div>

      <div class="group last">
        <div class="group-title">Sound</div>
        <div class="row">
          <button type="button" class="chip" id="sound">🔊 On</button>
        </div>
        <div class="row slider-row">
          <span class="tag">Sustain</span>
          <input type="range" class="range" id="sustain" min="0.2" max="3.5" step="0.05" value="1" aria-label="Sustain">
          <span class="value" id="sustain-label">5.2s</span>
        </div>
        <div class="row slider-row">
          <span class="tag">Reverb</span>
          <div class="row tight" id="reverbs">
            <button type="button" class="chip sm" data-reverb="dry">Dry</button>
            <button type="button" class="chip sm" data-reverb="room">Room</button>
            <button type="button" class="chip sm" data-reverb="hall">Hall</button>
          </div>
        </div>
      </div>

    </div>
  </header>

  <main class="stage" aria-label="Piano keyboard. Play notes by typing: A through quote for naturals, the row above for sharps, Z and X to shift octave.">
    <div class="floor-shadow" aria-hidden="true"></div>
    <div class="rig" id="rig">
      <div class="board" id="board"></div>
    </div>
  </main>

  <footer class="status" id="status" aria-live="polite">Click keys or type A–L to play · Z/X shifts octave · drag for glissando</footer>
</div>
</body>
</html>
